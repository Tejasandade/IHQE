version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: ihqe-clickhouse
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:16-alpine
    container_name: ihqe-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ihqe_app
      POSTGRES_USER: ihqe
      POSTGRES_PASSWORD: ihqe_secret
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  api:
    build: .
    container_name: ihqe-api
    ports:
      - "8000:8000"
    depends_on:
      - clickhouse
      - postgres
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=9000
      - CH_HTTP_PORT=8123
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=ihqe_auth
      - PG_USER=ihqe
      - PG_PASSWORD=ihqe_secret
    env_file:
      - ./config/.env
    volumes:
      - ./data:/app/data

  frontend:
    build: 
      context: ./dashboard/frontend
    container_name: ihqe-frontend
    ports:
      - "80:80"
    depends_on:
      - api
